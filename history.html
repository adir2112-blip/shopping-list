<!DOCTYPE html>

<link rel="apple-touch-icon" href="assets/icon-192.png">

<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="mobile-web-app-capable" content="yes">

<title>היסטוריית קניות</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="topbar-title">היסטוריה<span class="dot">.</span></div>
  <div class="topbar-actions">
    <span class="workspace-badge" id="workspaceBadge"></span>
    <span class="sync-dot" title="מסונכרן"></span>
    <div class="nav-pill">
      <a href="index.html">רשימת קניות</a>
      <a href="edit.html">עריכת רשימה</a>
      <a href="history.html" class="active">היסטוריה</a>
      <a href="settings.html" id="settingsNavLink" style="display:none;">הגדרות</a>
    </div>
  </div>
</div>

<div class="wrap" id="historyContainer">
  <div class="loading-spinner"></div>
</div>

<div class="app-footer">A.L ייעוץ תכנון והקמת מערכות</div>

<!-- Modal: trip details -->
<div class="modal-backdrop" id="detailsModal">
  <div class="modal-sheet" style="max-height:75vh; overflow-y:auto;">
    <div class="modal-title" id="detailsTitle">פירוט קניה</div>
    <div id="detailsList"></div>
    <div class="modal-actions">
      <button class="modal-btn danger" id="deleteTrip">מחיקת רשומה</button>
      <button class="modal-btn secondary" id="closeDetails">סגירה</button>
    </div>
  </div>
</div>

<script src="assets/supabase-client.js"></script>
<script src="assets/workspaces.js"></script>
<script src="assets/install-prompt.js"></script>
